# ============================================
# SonarQube Project Configuration
# INEX Internship Discovery Platform
# ============================================

# Project identification
sonar.projectKey=inex-webapp
sonar.projectName=INEX Internship Discovery Platform
sonar.projectVersion=1.0

# Source code location
sonar.sources=src
sonar.exclusions=\
  node_modules/**,\
  .next/**,\
  public/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/coverage/**

# Test files location (when tests are added)
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# TypeScript configuration
sonar.typescript.tsconfigPath=tsconfig.json

# Source encoding
sonar.sourceEncoding=UTF-8

# SonarQube server (matches docker-compose.yml service)
sonar.host.url=http://sonarqube:9000

# Coverage report path (when tests are added)
# sonar.javascript.lcov.reportPaths=coverage/lcov.info